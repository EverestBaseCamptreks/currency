<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NepaliPulse Pro | Smart Tasks & Productivity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    /* Light mode (default) */
    :root {
      --bg-gradient-start: #f0f4fa;
      --bg-gradient-end: #e6edf4;
      --card-bg: rgba(255, 255, 255, 0.92);
      --text-primary: #1e2a36;
      --text-secondary: #5b6f82;
      --task-bg: #f9fafc;
      --task-border: #edf2f7;
      --imp-bg: #fff7e8;
      --imp-border: #f5a623;
      --btn-bg: #1e2b3c;
      --btn-hover: #f5a623;
    }

    body.dark {
      --bg-gradient-start: #0f172a;
      --bg-gradient-end: #1e293b;
      --card-bg: rgba(30, 41, 59, 0.95);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --task-bg: #1e293b;
      --task-border: #334155;
      --imp-bg: #2d1f00;
      --imp-border: #f59e0b;
      --btn-bg: #f59e0b;
      --btn-hover: #d97706;
    }

    body {
      background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      transition: background 0.3s ease;
    }

    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header with theme toggle */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--task-border);
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-primary);
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }

    .theme-toggle:hover {
      transform: scale(0.95);
    }

    /* Grid layout */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
      padding: 1.8rem 2rem;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .time-card {
      background: linear-gradient(135deg, #1e2b3c, #0f212e);
      color: white;
    }

    body.dark .time-card {
      background: linear-gradient(135deg, #0f172a, #020617);
    }

    .nepal-time {
      font-size: 4.2rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 0.5rem;
    }

    .date-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1.5rem 0 0.8rem 0;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 1.2rem;
    }

    .date-block, .day-block {
      background: rgba(255,255,255,0.12);
      border-radius: 1.8rem;
      padding: 0.6rem 1.2rem;
      text-align: center;
      flex: 1;
    }

    .date-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .date-value {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 0.2rem;
    }

    /* Progress section */
    .progress-section {
      background: rgba(255,255,255,0.1);
      border-radius: 1rem;
      padding: 1rem;
      margin: 1rem 0;
    }

    .progress-bar-container {
      background: rgba(255,255,255,0.2);
      border-radius: 1rem;
      height: 1rem;
      overflow: hidden;
      margin: 0.5rem 0;
    }

    .progress-fill {
      background: #f5a623;
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 1rem;
    }

    .streak-badge {
      display: inline-block;
      background: #f5a623;
      color: #1e2b3c;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: bold;
      margin-top: 0.5rem;
    }

    /* Quote section */
    .quote-section {
      background: rgba(255,255,255,0.08);
      border-radius: 1rem;
      padding: 0.8rem;
      margin-top: 1rem;
      font-style: italic;
      font-size: 0.9rem;
    }

    /* Important task */
    .important-task-section {
      background: var(--imp-bg);
      border-left: 8px solid var(--imp-border);
      border-radius: 1.8rem;
      padding: 1.2rem 1.5rem;
      margin-top: 1rem;
    }

    .imp-task-content {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Todo filters */
    .filter-buttons {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.4rem 1rem;
      border: 1px solid var(--task-border);
      background: var(--task-bg);
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-primary);
    }

    .filter-btn.active {
      background: #f5a623;
      color: white;
      border-color: #f5a623;
    }

    .task-item {
      background: var(--task-bg);
      margin-bottom: 0.7rem;
      padding: 0.9rem 1rem;
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--task-border);
    }

    .category-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      font-weight: 600;
    }

    .category-work { background: #3b82f6; color: white; }
    .category-personal { background: #10b981; color: white; }
    .category-health { background: #ef4444; color: white; }
    .category-shopping { background: #8b5cf6; color: white; }

    .add-task-form {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .task-input, .category-select {
      padding: 0.8rem 1rem;
      border: 1px solid var(--task-border);
      border-radius: 2rem;
      background: var(--task-bg);
      color: var(--text-primary);
    }

    .task-input { flex: 2; }
    .category-select { flex: 1; }

    .add-btn {
      background: var(--btn-bg);
      color: white;
      border: none;
      padding: 0 1.5rem;
      border-radius: 2rem;
      cursor: pointer;
    }

    .notification-snack {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2c2e3a;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      z-index: 1000;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }

    .notification-snack.show {
      opacity: 1;
    }

    @media (max-width: 800px) {
      .grid-container { grid-template-columns: 1fr; }
      .nepal-time { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

<div class="dashboard">
  <div class="header-bar">
    <h2 style="color: var(--text-primary);">🇳🇵 NepaliPulse Pro</h2>
    <button class="theme-toggle" id="themeToggle">🌙 Dark Mode</button>
  </div>

  <div class="grid-container">
    <div class="card time-card">
      <div class="nepal-time" id="liveNepalTime">--:--:--</div>
      <div class="date-wrapper">
        <div class="date-block"><div class="date-label">ENGLISH DATE</div><div class="date-value" id="engDate">---</div></div>
        <div class="date-block"><div class="date-label">ENGLISH DAY</div><div class="date-value" id="engDay">---</div></div>
        <div class="date-block"><div class="date-label">🇳🇵 NEPALI DATE</div><div class="date-value" id="nepaliDate">---</div></div>
        <div class="day-block"><div class="date-label">🇳🇵 NEPALI DAY</div><div class="date-value" id="nepaliDay">---</div></div>
      </div>

      <!-- Progress & Streak -->
      <div class="progress-section">
        <div style="display: flex; justify-content: space-between;">
          <span>📊 Today's Progress</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-container"><div class="progress-fill" id="progressFill"></div></div>
        <div><span class="streak-badge" id="streakDisplay">🔥 Streak: 0 days</span></div>
      </div>

      <!-- Daily Quote -->
      <div class="quote-section" id="dailyQuote">💭 Loading inspiration...</div>

      <div class="important-task-section">
        <div class="imp-label">⭐ MOST IMPORTANT TASK</div>
        <div class="imp-task-content">
          <span id="importantTaskText">Set your priority task</span>
          <button class="edit-imp-btn" id="editImportantBtn" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">✏️</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>📋 TODAY'S TASKS</h3>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="work">💼 Work</button>
        <button class="filter-btn" data-filter="personal">🏠 Personal</button>
        <button class="filter-btn" data-filter="health">💪 Health</button>
        <button class="filter-btn" data-filter="shopping">🛒 Shopping</button>
      </div>
      <div class="add-task-form">
        <input type="text" id="taskInput" class="task-input" placeholder="Write a task...">
        <select id="categorySelect" class="category-select">
          <option value="work">💼 Work</option>
          <option value="personal">🏠 Personal</option>
          <option value="health">💪 Health</option>
          <option value="shopping">🛒 Shopping</option>
        </select>
        <button id="addTaskBtn" class="add-btn">+ Add</button>
      </div>
      <ul class="tasks-list" id="tasksContainer" style="list-style:none; max-height:400px; overflow-y:auto;"></ul>
    </div>
  </div>
</div>

<div id="notificationSnack" class="notification-snack"></div>

<script>
  // Nepal Time functions
  function getNepalTimeDate() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    return new Date(utc + (345 * 60000));
  }

  function formatNepalTime() {
    return getNepalTimeDate().toLocaleTimeString('en-GB', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  // Nepali Calendar (Corrected: Chaitra 23, 2082 on April 6, 2026)
  const NEPALI_MONTHS = ["Baisakh","Jestha","Ashadh","Shrawan","Bhadra","Ashwin","Kartik","Mangsir","Poush","Magh","Falgun","Chaitra"];
  const NEPALI_DAYS = ["Aaitabar","Sombar","Mangalbar","Budhabar","Bihibar","Shukrabar","Sanibar"];
  const REF_GREG = new Date(Date.UTC(2026, 3, 6));
  const REF_BS_YEAR = 2082, REF_BS_MONTH = 11, REF_BS_DAY = 23;

  function getBsDaysInMonth(year, month) {
    const days = [31,32,31,32,31,30,30,30,29,30,29,30];
    return days[month];
  }

  function gregorianToBs(date) {
    const targetUTC = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
    const refUTC = Date.UTC(REF_GREG.getFullYear(), REF_GREG.getMonth(), REF_GREG.getDate());
    let diffDays = Math.floor((targetUTC - refUTC) / 86400000);
    let bsYear = REF_BS_YEAR, bsMonth = REF_BS_MONTH, bsDay = REF_BS_DAY + diffDays;
    while (bsDay > getBsDaysInMonth(bsYear, bsMonth)) {
      bsDay -= getBsDaysInMonth(bsYear, bsMonth);
      bsMonth++;
      if (bsMonth >= 12) { bsMonth = 0; bsYear++; }
    }
    return { year: bsYear, month: bsMonth, day: bsDay };
  }

  function updateDateTime() {
    document.getElementById('liveNepalTime').innerText = formatNepalTime();
    const nepDate = getNepalTimeDate();
    document.getElementById('engDate').innerText = nepDate.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    document.getElementById('engDay').innerText = nepDate.toLocaleDateString('en-US', { weekday:'long' });
    const bs = gregorianToBs(nepDate);
    document.getElementById('nepaliDate').innerText = `${bs.year} ${NEPALI_MONTHS[bs.month]} ${bs.day}`;
    document.getElementById('nepaliDay').innerText = NEPALI_DAYS[nepDate.getDay()];
  }
  setInterval(updateDateTime, 1000);
  updateDateTime();

  // Daily Quotes
  const quotes = [
    "💪 " + "“Discipline is the bridge between goals and accomplishment.” – Jim Rohn",
    "🏔️ " + "“Success is not final, failure is not fatal: it is the courage to continue that counts.” – Winston Churchill",
    "🇳🇵 " + "“Sahara bhanda mathi ko yatra, aafnai paila ko pahichan ho.” – Nepali Proverb",
    "🌟 " + "“The future depends on what you do today.” – Mahatma Gandhi",
    "📈 " + "“Small daily improvements are the key to staggering long-term results.”"
  ];
  function updateDailyQuote() {
    const today = new Date().toDateString();
    let quoteIndex = localStorage.getItem('dailyQuoteIndex');
    let lastDate = localStorage.getItem('lastQuoteDate');
    if (lastDate !== today) {
      quoteIndex = Math.floor(Math.random() * quotes.length);
      localStorage.setItem('dailyQuoteIndex', quoteIndex);
      localStorage.setItem('lastQuoteDate', today);
    }
    document.getElementById('dailyQuote').innerHTML = `💭 ${quotes[quoteIndex || 0]}`;
  }
  updateDailyQuote();

  // Dark Mode
  let darkMode = localStorage.getItem('darkMode') === 'true';
  if (darkMode) document.body.classList.add('dark');
  document.getElementById('themeToggle').onclick = () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    document.getElementById('themeToggle').innerText = document.body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
  };
  document.getElementById('themeToggle').innerText = darkMode ? '☀️ Light Mode' : '🌙 Dark Mode';

  // Important Task
  let importantTask = localStorage.getItem('nepal_important_task') || "Complete your most impactful task today";
  document.getElementById('importantTaskText').innerText = importantTask;
  document.getElementById('editImportantBtn').onclick = () => {
    let newTask = prompt("Most Important Task:", importantTask);
    if (newTask?.trim()) {
      importantTask = newTask.trim();
      localStorage.setItem('nepal_important_task', importantTask);
      document.getElementById('importantTaskText').innerText = importantTask;
      showNotification("⭐ Important task updated!");
    }
  };

  // Todo with Categories
  let currentTasks = [];
  let currentFilter = 'all';

  function getStorageKey() {
    const d = getNepalTimeDate();
    return `tasks_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }

  function saveTasks() {
    localStorage.setItem(getStorageKey(), JSON.stringify(currentTasks));
    updateProgressAndStreak();
  }

  function loadTasks() {
    const stored = localStorage.getItem(getStorageKey());
    if (stored) currentTasks = JSON.parse(stored);
    else currentTasks = [
      { id: Date.now(), text: "Review project", completed: false, category: "work" },
      { id: Date.now()+1, text: "Exercise 20min", completed: false, category: "health" }
    ];
    renderTasks();
  }

  function renderTasks() {
    let filtered = currentFilter === 'all' ? currentTasks : currentTasks.filter(t => t.category === currentFilter);
    const container = document.getElementById('tasksContainer');
    if (!filtered.length) { container.innerHTML = '<li style="text-align:center; padding:1rem;">✨ No tasks</li>'; return; }
    container.innerHTML = filtered.map(task => `
      <li class="task-item">
        <input type="checkbox" class="task-check" data-id="${task.id}" ${task.completed ? 'checked' : ''}>
        <span style="flex:1; ${task.completed ? 'text-decoration:line-through; opacity:0.6' : ''}">${task.text}</span>
        <span class="category-badge category-${task.category}">${task.category}</span>
        <button class="delete-task" data-id="${task.id}" style="background:none; border:none; cursor:pointer;">🗑️</button>
      </li>
    `).join('');
    document.querySelectorAll('.task-check').forEach(cb => cb.addEventListener('change', (e) => toggleTask(parseInt(e.target.dataset.id), e.target.checked)));
    document.querySelectorAll('.delete-task').forEach(btn => btn.addEventListener('click', (e) => deleteTask(parseInt(btn.dataset.id))));
    updateProgressAndStreak();
  }

  function toggleTask(id, completed) {
    const task = currentTasks.find(t => t.id === id);
    if (task) { task.completed = completed; saveTasks(); renderTasks(); }
  }

  function deleteTask(id) {
    currentTasks = currentTasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
    showNotification("Task deleted");
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    const category = document.getElementById('categorySelect').value;
    if (!text) { showNotification("Please enter a task"); return; }
    currentTasks.push({ id: Date.now(), text, completed: false, category });
    saveTasks();
    renderTasks();
    input.value = '';
    showNotification(`✅ "${text}" added`);
  }

  // Progress & Streak
  function updateProgressAndStreak() {
    const total = currentTasks.length;
    const completed = currentTasks.filter(t => t.completed).length;
    const percent = total === 0 ? 0 : Math.round((completed/total)*100);
    document.getElementById('progressPercent').innerText = `${percent}%`;
    document.getElementById('progressFill').style.width = `${percent}%`;
    
    // Streak tracking
    let streak = parseInt(localStorage.getItem('taskStreak') || '0');
    const lastCompletedDate = localStorage.getItem('lastFullCompleteDate');
    const todayKey = getStorageKey();
    const allCompleted = total > 0 && completed === total;
    
    if (allCompleted && lastCompletedDate !== todayKey) {
      streak++;
      localStorage.setItem('taskStreak', streak);
      localStorage.setItem('lastFullCompleteDate', todayKey);
    } else if (!allCompleted && total > 0) {
      // Don't reset streak immediately, only if missed a day
      const yesterday = new Date(getNepalTimeDate());
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayKey = `tasks_${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
      const yesterdayTasks = localStorage.getItem(yesterdayKey);
      if (yesterdayTasks) {
        const yTasks = JSON.parse(yesterdayTasks);
        const yCompleted = yTasks.filter(t => t.completed).length;
        if (yTasks.length > 0 && yCompleted !== yTasks.length) streak = 0;
      }
      localStorage.setItem('taskStreak', streak);
    }
    document.getElementById('streakDisplay').innerHTML = `🔥 Streak: ${streak} day${streak !== 1 ? 's' : ''}`;
  }

  // Browser Notifications
  if ("Notification" in window) {
    Notification.requestPermission();
  }
  function showNotification(msg) {
    const snack = document.getElementById('notificationSnack');
    snack.innerText = msg;
    snack.classList.add('show');
    setTimeout(() => snack.classList.remove('show'), 3000);
    if (Notification.permission === "granted" && msg.includes("pending")) {
      new Notification("NepaliPulse Reminder", { body: msg, icon: "📋" });
    }
  }

  // Evening reminder
  setInterval(() => {
    const hour = getNepalTimeDate().getHours();
    if (hour === 21) {
      const pending = currentTasks.filter(t => !t.completed).length;
      if (pending > 0) showNotification(`🌙 ${pending} pending task(s) remaining!`);
    }
  }, 60000);

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderTasks();
    });
  });

  document.getElementById('addTaskBtn').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') addTask(); });
  
  loadTasks();
  setInterval(() => { loadTasks(); updateDateTime(); }, 60000);
  updateProgressAndStreak();
</script>
</body>
</html>
